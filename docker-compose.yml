# ============================================================================
# One-command stack: the app + a PostgreSQL database.
# Use this on any VPS (Oracle Cloud Always Free, a $4 Hetzner box, etc.):
#
#   1. Copy .env.example to .env and fill in the values
#   2. docker compose up -d --build
#   3. The app is live on http://SERVER_IP:8000
#
# On first boot the app auto-creates its tables, so there is nothing to migrate.
# ============================================================================

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quiz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quizpass}
      POSTGRES_DB: ${POSTGRES_DB:-quiz}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quiz}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8000
      NODE_ENV: production
      # Local DB inside the compose network — no SSL.
      DATABASE_URL: postgres://${POSTGRES_USER:-quiz}:${POSTGRES_PASSWORD:-quizpass}@db:5432/${POSTGRES_DB:-quiz}
      DATABASE_SSL: "false"
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8000:8000"

volumes:
  db-data:

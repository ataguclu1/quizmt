# ============================================================================
# One-click deploy to Render (free tier). In the Render dashboard:
#   New +  ->  Blueprint  ->  connect this repo. Render reads this file and
#   creates the web service + a free PostgreSQL database, wired together.
# After deploy you get a free https://<name>.onrender.com address; you can also
# attach your own custom domain for free under the service's "Settings".
# ============================================================================

services:
  - type: web
    name: assistt-quiz
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      # Render injects PORT automatically; the app reads it.
      - key: JWT_SECRET
        generateValue: true        # Render generates a strong random secret
      - key: DATABASE_URL
        fromDatabase:
          name: assistt-quiz-db
          property: connectionString
      # OPENAI_API_KEY is optional — add it in the dashboard to enable AI.

databases:
  - name: assistt-quiz-db
    plan: free
    databaseName: quiz
    user: quiz
